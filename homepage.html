<!DOCTYPE html>
<html>
    <head>
        <title>MMU Study Forum</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="CYX. css/homepage.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
       <div  class="homepage">
        <img class="mmu-robot" src="Cyx.photo/mmu.robot.png" alt ="study image ">
        <div >
            <h3 class="title">MMU Study Forum</h3>
            <p class="quote">Study smarter, not alone — log in and learn together.</p>

        </div>
        <div class="register">
            <h1><u>Log In</u></h1>
            <img class="profile-icon" src="Cyx.photo/profile.png" alt="profile-icon">
            <input type="text" placeholder="School Email">
            <input type="password" placeholder="Password">
            <p class="forgot-password"><u>Forgot your password?</u></p>
            <button class="log-in" >Log In</button>
            <p class="no-account">Don't have an account? </p>
            <button class="sign-up" href="signup_page.html">Sign Up</button>
        </div>
       </div>
       
    </body>
</html>
