{% extends 'admin_manager/admin_base.html' %}
{% load static %}

{% block title %} MMU Forum - Create Post {% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'admin_manager/admin_post.css' %}">

<div class="post-card">
    <div class="form-container">
        <div class="form-header">
            <h2><i class="fas fa-plus-circle"></i> Create Post</h2>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Title <span class="required">*</span></label>
                <input type="text" name="title" placeholder="Enter post title" required>
            </div>

            <div class="form-group">
                <label>Content <span class="required">*</span></label>
                <textarea name="content" rows="10" class="form-textarea" placeholder="Write your post content..." required></textarea>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select name="category" class="form-select">
                    <option value="">No Category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.category }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Publish Post</button>
                <a href="{% url 'admin-main' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
