<!DOCTYPE html>

<html>

    <head>
        <title>MMU Study Forum</title>
    </head>

<style>

body{
    background-color: #d2dfcd;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

.top_bar{
    display: flex;
    background-color:#8c9e88;
}

div.title{
    display: flex;
}

div.title h1{
    font-size: 170%;
    color: #3a4936;
    margin: auto;
    margin-left: 70px;
    padding: auto;
    font-style: bold;
}

form.search_bar{
    display: flex;
    border-radius:60px;
    align-items:center;
    background-color:#bbcca8;
    height: 35px;
    width: 500px;
    margin: auto;
    padding: auto;
}

form img{
    width:20px;
    height:20px;
}

div.register{
    align-items:right;
}

button.sign_up{
    background-color: #d2dfcd;
    color: #3a4936;
    padding: 8px;
    border-radius: 10px;
    border-color: #d2dfcd;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

button.log_in{
    background-color: #3a4936;
    color: #d2dfcd;
    padding: 8px;
    margin: 20px;
    margin-left: 5px;
    border-radius: 10px;
    border-color: #3a4936;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

nav.category{
    text-align: center;
    padding: auto;
}
nav.category button{

    background-color: #bbcca8;
    color: #3a4936;
    border-radius: 15px;
}

nav.features{
    background-color: #8c9e88;
    width: 5%;
    height: 100%;
    position: fixed;
}

nav.features img{
    width:30px;
    height: 30px;
    margin-left: 15px;
    padding-top: 20px;
}

<body>
    
    <div class="top_bar">
        <div class="title">
            <h1>MMU Study Forum</h1>
        </div>
        <form class="search_bar">
            <label><img src="search.png" alt="Search"></label>
            <input type="text" name="fquestion" placeholder="Finding something?"><br>
        </form>
        <div class="register">
            <button class="sign_up">SIGN UP</button>
            <button class="log_in">LOG IN</button>
        </div>
    </div>

    <nav class="category">

        <button>FCA</button>
        <button>FAC</button>
        <button>FAIE</button>
    </nav>

    <nav class="features">
        <a href="homepage.html"><img src="home.png" alt="Home"></a>
        <a href="profile.html"><img src="user.png" alt="Profile"></a>
        <a href="notification.html"><img src="bell.png" alt="Notification"></a>
        <a href="favourite.html"><img src="heart.png" alt="Favourite"></a>
        <a href="create_post.html"><img src="add.png" alt="Create"></a>
