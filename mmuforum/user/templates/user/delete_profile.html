{% extends "home/base.html" %}
{% load crispy_forms_tags %}
{% load static %}

<html>
     {% block content %}
<head>
    <title>Delete Account</title>
    <link rel="stylesheet" href="{% static 'user/delete_profile.css' %}">
</head>
<body>
    <div class="delete-profile-container">
    <p class="dlt-acc">Are you sure you want to delete your account? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn" type="submit">Yes, delete my account</button>
        <a class="cancel btn" href="{% url 'view-profile' user.username %}">Cancel</a>
    </form>
    </div>
</body>
 {% endblock content %}
</html>
