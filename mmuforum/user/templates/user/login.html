{% extends "home/base.html" %}
{% load crispy_forms_tags %}
{% load static %}
<html>
    {% block content %}
    <head>
         <link rel="stylesheet" href="login.css">
         <link rel="preconnect" href="https://fonts.googleapis.com">
         <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
         <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Calistoga&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil:ital,wdth@0,112.5;1,112.5&display=swap" rel="stylesheet">
         <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    </head>

    <body>
       <div >
        <div>
            <form method="POST">
                {%csrf_token%}
             <fieldset class="form-group">
                <legend>Log In</legend>
                <div>
                 {{ form|crispy }}
                </div>
                 <button  type="submit">Log In</button>
             </fieldset>
            </form>
        </div>
        <div class="button">
            <p>Don't have an account?</p>
            <button  ><a href= "{% url 'forum-signup' %}">Sign Up</a></button>
            <a class="forgot-password">Forgot password</a>
            <button><a href="{% url 'forum-home' %}">Home</a></button>
            
       </div>
      
    </body>  
        {% endblock content %}
</html>
