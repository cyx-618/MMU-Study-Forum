{% extends "home/base.html" %}
{% load crispy_forms_tags %}

<html>
{%block content%}

  <div class="main-container">
    <h>Create your profile</h>
    
    <form method="POST" >
        {% csrf_token%}

        <p>Username :{{username}}</p>
        <p>Email : {{email}} </p>
        {{ form|crispy }}
        <button type="submit" >Submit Profile Info</button>
    </form>
  </div>

  {% endblock content %}
  </html>
