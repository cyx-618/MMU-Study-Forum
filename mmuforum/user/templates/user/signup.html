{% extends "home/base.html" %}
{% load crispy_forms_tags %}
{% load static %}
<html>
    {% block content %}
    <head>
        <title>Sign Up</title>
        <link rel="stylesheet" href="{% static 'user/signup.css' %}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Calistoga&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil:ital,wdth@0,112.5;1,112.5&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    </head>
    <body>
       <div >
        <div>
            <h2 class="sign-up-title">Sign Up</h2>
            <form method="POST">
                {%csrf_token%}
             <fieldset class="form-group">
                <div>
                {{ form|crispy }}
                </div>
                 <button name="register-btn" type="submit">Register </button>
             </fieldset>
            </form>
        </div>
        <div class="button">
            <p>Alreday have an account?</p>
            <a class="log-in-btn" href= "{% url 'forum-login' %}">Log In</a>
            <a class="home-btn" href="{%url 'forum-home' %}">Home</a>
       </div>
      
    </body>   
        
    {% endblock content %}
</html>
