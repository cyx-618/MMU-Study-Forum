{% extends "home/base.html" %}
{% load static %}
<html>
    {% block content %}
    <head>
        <link rel="stylesheet" href=" {% static 'user/signup.css' %} ">
        <link rel="icon" type="image/png" href="website-logo.png">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    </head>

    <body>
       <div class="sign-up">
        <h2>SIGN UP</h2>
        <div class="info">
            <form method="POST" action="{url 'forum-signup'}">
                {%csrf_token%}
                <div class="align-col">
                <i class="material-icons" id="profile-circle">account_circle</i>
                <input name="username" type="text" placeholder="Username" >
                </div>
                <div class="align-col">
                <i class="material-icons" id="lock-icon">lock</i>
                <input name="password" type="password" placeholder="Password">
                </div>

                <div class="align-col">
                <i class="material-icons" id="mail-icon">mail</i>
                <input name="email" type="text" placeholder="Email">
                </div>
            </form>
        </div>
        <div class="button">
            <button class="log-in" ><a href= "{% url 'forum-home' %}">Back to Log In</a></button>
            <button class="register" name="CreateUser" type="submit">Register <i class="material-icons" id="arrow-icon">arrow_forward</i></button>           
        </div>
       </div>
      
    </body> 
    
    <!--<form>{% csrf_token %}</form>-->

        <!--pop up message for sucessful signup/login-->

            { for message in messages }
                _alert/pop up message_

                    _(name a class) for this alert message -{{ message.tag }}_
                    {{ message }}
                </div>
            { end for }
        { end if }    
    -->    
        
    {% endblock content %}
    </html>
